<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <input type="text" id="mavzu" placeholder="Mavzuni yozing...">
    <button onclick="yarat()">PDF Yaratish</button>

    <script>
        async function yarat() {
            const mavzu = document.getElementById('mavzu').value;
            // Sizdagi AQ... bilan boshlanuvchi kalitni shu yerga qo'ying
            const ACCESS_TOKEN = "AQ.Ab8RN6IKMOScehyH92S0rgAqU8Pwh8RWmiW6FDffO8GeUlaSLg"; 

            // Token bilan so'rov yuborish
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`;

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + ACCESS_TOKEN 
                    },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: mavzu + " haqida qisqa slayd matni yoz." }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    alert("Xato: " + data.error.message);
                    console.log(data.error);
                    return;
                }

                const aiText = data.candidates[0].content.parts[0].text;
                
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text(aiText, 10, 10, { maxWidth: 180 });
                doc.save("slayd.pdf");
                
            } catch (e) {
                alert("Tarmoq xatosi: " + e.message);
            }
        }
    </script>
</body>
</html>
