<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AI Slayd Sinov</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <h2>AI Slayd Sinov</h2>
    <input type="text" id="mavzu" placeholder="Mavzuni kiriting...">
    <button onclick="yarat()">Slayd yaratish</button>

    <script>
        async function yarat() {
            const mavzu = document.getElementById('mavzu').value;
            const API_KEY = "AQ.Ab8RN6IHC9GzSEsernNqP5YJlX5SiYol2dvxcvrc2yHG_0rvTw"; // SHU YERGA GOOGLE AI STUDIO KALITINI QO'YING

            if (!mavzu) return alert("Mavzuni kiriting!");

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${mavzu} mavzusida 3 ta slayd uchun qisqa matn yoz.` }] }]
                })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;

            // PDF yaratish
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(aiText, 10, 10);
            doc.save("test_slayd.pdf");
        }
    </script>
</body>
</html>
