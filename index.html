<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlaydX Bot</title>
    <style>
        body { background-color: #0f0a1f; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .container { padding: 20px; padding-bottom: 80px; }
        .header { text-align: center; font-size: 24px; font-weight: bold; color: #00f2ff; margin-bottom: 20px; }
        
        /* Xizmatlar Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #1a1533; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #2a254d; }
        .card div { font-size: 12px; margin-top: 5px; color: #aaa; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #1a1533; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="container" id="content">
    <div class="header">SlaydX bot</div>
    
    <div class="grid">
        <div class="card">📄 <div>Slayd yaratish</div></div>
        <div class="card">📝 <div>Mustaqil ish</div></div>
        <div class="card">📑 <div>Referat</div></div>
        <div class="card">✅ <div>Test</div></div>
        <div class="card">📋 <div>Tezis</div></div>
        <div class="card">📰 <div>Maqola</div></div>
        <div class="card">📖 <div>Glossary</div></div>
        <div class="card">🧩 <div>Krossvord</div></div>
        <div class="card">🎓 <div>Kurs ishi</div></div>
        <div class="card">🎨 <div>Rasm yaratish</div></div>
        <div class="card">🤖 <div>AI Yordamchi</div></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item" onclick="loadPage('home')">🏠<br>Bosh sahifa</div>
    <div class="nav-item" onclick="loadPage('prices')">🏷️<br>Narxlar</div>
    <div class="nav-item" onclick="loadPage('balance')">💳<br>Balansim</div>
</div>

<script>
    function loadPage(page) {
        const content = document.getElementById('content');
        if(page === 'home') content.innerHTML = "<h1>Bosh sahifa</h1><p>Asosiy menyu...</p>";
        else if(page === 'prices') content.innerHTML = "<h1>Narxlar</h1><p>Obuna narxlari bu yerda.</p>";
        else content.innerHTML = "<h1>Balans</h1><p>Sizda 0 so'm mavjud.</p>";
    }
</script>

</body>
</html>
