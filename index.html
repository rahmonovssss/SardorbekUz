<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaydchi Bot</title>
    <style>
        :root {
            --bg: #0a0a12;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #00f2ff;
        }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .header { text-align: center; padding: 30px; font-size: 28px; font-weight: bold; background: linear-gradient(to right, #00f2ff, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .icon { font-size: 30px; margin-bottom: 10px; display: block; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(15px); padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; color: #888; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

<div class="header">Slaydchi Bot 🎓</div>

<div class="grid" id="main-content">
    <div class="card"><span class="icon">📄</span>Slayd yaratish</div>
    <div class="card"><span class="icon">✍️</span>Mustaqil ish</div>
    <div class="card"><span class="icon">📑</span>Referat</div>
    <div class="card"><span class="icon">✅</span>Test</div>
    <div class="card"><span class="icon">📝</span>Tezis</div>
    <div class="card"><span class="icon">📰</span>Maqola</div>
    <div class="card"><span class="icon">🎨</span>Rasm yaratish</div>
    <div class="card"><span class="icon">🤖</span>AI Yordamchi</div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="render('home')">🏠<br>Bosh sahifa</div>
    <div class="nav-item" onclick="render('prices')">🏷️<br>Narxlar</div>
    <div class="nav-item" onclick="render('balance')">💳<br>Balansim</div>
    <div class="nav-item" onclick="render('refill')">💰<br>To'ldirish</div>
</div>

<script>
    function render(page) {
        const content = document.getElementById('main-content');
        if(page === 'home') location.reload(); // Bosh sahifani qayta yuklash
        else content.innerHTML = `<div style="padding:20px; text-align:center; width:100%">${page.toUpperCase()} bo'limi ustida ishlanmoqda...</div>`;
    }
</script>

</body>
</html>
